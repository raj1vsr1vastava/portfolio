<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Rajiv Srivastava</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b;
      color: #e8e4de;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 480px;
    }
    .divider {
      width: 48px;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 0 auto 32px;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 8rem;
      font-weight: 400;
      color: #4faa73;
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }
    p {
      font-family: 'Source Sans 3', sans-serif;
      color: #8a8680;
      font-size: 1.125rem;
      font-weight: 400;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
    }
    a {
      display: inline-block;
      padding: 14px 36px;
      background: #4faa73;
      color: #09090b;
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 500;
      font-size: 0.9375rem;
      letter-spacing: 0.02em;
      transition: background 0.25s ease, transform 0.25s ease;
    }
    a:hover {
      background: #6bc492;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <div class="divider"></div>
    <p>Page not found</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
