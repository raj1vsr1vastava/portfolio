<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Rajiv Srivastava</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 {
      font-size: 6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #0078D4 0%, #7B2FF7 50%, #E74494 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }
    p { color: #5a5a5a; font-size: 1.125rem; margin-bottom: 32px; }
    a {
      display: inline-block;
      padding: 14px 32px;
      background: #0078D4;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 120, 212, 0.25);
    }
    a:hover { background: #1a86d9; box-shadow: 0 4px 16px rgba(0, 120, 212, 0.35); }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/">Back to Portfolio</a>
  </div>
</body>
</html>
