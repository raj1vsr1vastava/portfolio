<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/portfolio/favicon.ico" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://kit.fontawesome.com 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; connect-src 'self' https:;">
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Rajiv Srivastava's Portfolio - Full Stack Developer" />
    <link rel="apple-touch-icon" href="/portfolio/logo192.png" />
    <link rel="manifest" href="/portfolio/manifest.json" />
    <title>Rajiv Srivastava - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/3aee19940d.js" crossorigin="anonymous"></script>
    <style>
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .loading-spinner {
            border: 3px solid rgba(0,102,204,.3);
            border-radius: 50%;
            border-top: 3px solid #0066cc;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-family: 'Inter', sans-serif;
            color: #0066cc;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loading-spinner"></div>
        <h2 class="loading-text">Loading Portfolio...</h2>
    </div>
    
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- Script to hide loader when React loads -->
    <script>
        window.addEventListener('load', function() {
            // If React app loads successfully, it will render content in #root
            // This checks if content was added to #root
            const checkForContent = setInterval(function() {
                if (document.getElementById('root').children.length > 0) {
                    const loader = document.getElementById('loading-overlay');
                    loader.style.opacity = '0';
                    setTimeout(function() {
                        loader.style.display = 'none';
                    }, 500);
                    clearInterval(checkForContent);
                }
            }, 100);
            
            // Safety timeout - hide loader after 5 seconds even if React doesn't load
            setTimeout(function() {
                const loader = document.getElementById('loading-overlay');
                if (loader.style.display !== 'none') {
                    loader.style.opacity = '0';
                    setTimeout(function() {
                        loader.style.display = 'none';
                    }, 500);
                }
            }, 5000);
        });
    </script>
    
    <script defer="defer" src="/portfolio/static/js/main.57623b33.js"></script>
</body>
</html>
